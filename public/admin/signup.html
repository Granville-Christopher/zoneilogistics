<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Signup — Zonei International Logistics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="stylesheet" href="/css/admin.css" />
    <link rel="icon" href="/assets/a.jpg" type="image/jpeg" />
  </head>
  <body class="auth-body">
    <main class="auth-shell">
      <section class="auth-card">
        <div class="auth-brand">
          <img src="/assets/a.jpg" alt="Zonei International Logistics" width="140" height="48" />
          <h1>Create admin account</h1>
          <p>First admin is open. Later signups require a private invite code.</p>
        </div>

        <form class="auth-form" id="signup-form" novalidate>
          <label>
            Full name
            <input type="text" name="name" autocomplete="name" required minlength="2" maxlength="80" />
          </label>
          <label>
            Work email
            <input type="email" name="email" autocomplete="username" required maxlength="120" />
          </label>
          <label>
            Password
            <input
              type="password"
              name="password"
              autocomplete="new-password"
              required
              minlength="12"
              maxlength="128"
              aria-describedby="password-hint"
            />
          </label>
          <p class="auth-hint" id="password-hint">
            At least 12 characters with upper, lower, number, and special character.
          </p>
          <label id="invite-field" class="is-hidden">
            Invite code
            <input type="password" name="inviteCode" autocomplete="off" maxlength="128" />
          </label>
          <p class="form-status" id="form-status" role="status"></p>
          <button class="btn btn--primary auth-submit" type="submit">Create account</button>
        </form>

        <p class="auth-switch">
          Already registered?
          <a href="/admin/login.html">Sign in</a>
        </p>
      </section>
    </main>
    <script src="/js/admin.js"></script>
  </body>
</html>
